<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
<defs>
<!-- Deep Dark Background Gradient -->
<radialGradient id="bg" cx="30%" cy="20%" r="85%">
<stop offset="0%" stop-color="#141521"/>
<stop offset="60%" stop-color="#0a0a0f"/>
<stop offset="100%" stop-color="#030305"/>
</radialGradient>

<!-- Glow Accents -->
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#7aa2f7"/>
<stop offset="50%" stop-color="#bb9af7"/>
<stop offset="100%" stop-color="#7dcfff"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="shadow">
<feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
</filter>

<!-- Pattern for the Circular Image -->
<pattern id="avatarPattern" width="1" height="1" patternUnits="objectBoundingBox">
<image x="0" y="0" width="148" height="148" href="https://github.com/Vaggiri.png" preserveAspectRatio="xMidYMid slice"/>
</pattern>
</defs>

<rect width="1180" height="610" rx="24" fill="url(#bg)"/>

<!-- Left Profile Section -->
<g transform="translate(75, 105)">
<!-- Rotating Border -->
<circle cx="150" cy="120" r="86" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="10 6">
<animateTransform attributeName="transform" type="rotate"
from="0 150 120" to="360 150 120" dur="20s" repeatCount="indefinite"/>
</circle>

<!-- The Profile Image -->
<circle cx="150" cy="120" r="74" fill="url(#avatarPattern)"/>

<text x="150" y="265" text-anchor="middle"
font-size="28" fill="#e6edf3"
font-family="JetBrains Mono,monospace" font-weight="700">
GIRISUDHAN V
</text>

<text x="150" y="292" text-anchor="middle"
font-size="14"
fill="#7dcfff"
font-family="JetBrains Mono,monospace">
EMBEDDED • IoT • FULL STACK
</text>

<!-- Status Badge -->
<rect x="60" y="330" width="180" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
<circle cx="82" cy="347" r="5" fill="#27c93f">
<animate attributeName="opacity" values="1;.2;1" dur="1.5s" repeatCount="indefinite"/>
</circle>
<text x="97" y="352" fill="#27c93f"
font-size="11"
font-family="JetBrains Mono,monospace">
SYSTEM STATUS : ONLINE
</text>
</g>

<!-- Right Terminal Section (MacOS Style) -->
<g transform="translate(430, 45)" filter="url(#shadow)">
<!-- Terminal Body -->
<rect width="690" height="510" rx="12" fill="#0d1017" stroke="#30363d" stroke-width="1.5"/>
<!-- Terminal Top Bar -->
<path d="M 0 12 Q 0 0 12 0 L 678 0 Q 690 0 690 12 L 690 40 L 0 40 Z" fill="#161b22"/>
<!-- MacOS Traffic Light Buttons -->
<circle cx="24" cy="20" r="6.5" fill="#ff5f56"/>
<circle cx="44" cy="20" r="6.5" fill="#ffbd2e"/>
<circle cx="64" cy="20" r="6.5" fill="#27c93f"/>

<text x="345" y="25" text-anchor="middle"
fill="#8b949e"
font-family="JetBrains Mono,monospace"
font-size="13">
girisudhan@github:~
</text>

<!-- Sequential Typing Animations -->
<g transform="translate(28, 75)"
font-family="JetBrains Mono,monospace"
font-size="14.5">

<!-- Command 1 -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.1s" fill="freeze"/>
<text y="0"><tspan fill="#7aa2f7">❯</tspan><tspan fill="#7dcfff"> whoami</tspan></text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.1s" fill="freeze"/>
<text y="24" fill="#a5d6ff">Girisudhan V | Pre-Final Year ECE @ Amrita Vishwa Vidyapeetham</text>
</g>

<!-- Command 2 -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.1s" fill="freeze"/>
<text y="60"><tspan fill="#7aa2f7">❯</tspan><tspan fill="#7dcfff"> ./load_profile.sh</tspan></text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.1s" fill="freeze"/>
<text y="86" fill="#27c93f">[✓] Loading Girisudhan V portfolio...</text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.1s" fill="freeze"/>
<text y="108" fill="#27c93f">[✓] Syncing GitHub repositories...</text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.1s" fill="freeze"/>
<text y="130" fill="#27c93f">[✓] Initializing Intel IoT Club projects...</text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.1s" fill="freeze"/>
<text y="152" fill="#27c93f">[✓] Deploying Full-Stack applications...</text>
</g>

<!-- Command 3 -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.1s" fill="freeze"/>
<text y="190"><tspan fill="#7aa2f7">❯</tspan><tspan fill="#7dcfff"> cat profile.json</tspan></text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.1s" fill="freeze"/>
<text y="216" fill="#ffbd2e">{</text>
<text x="18" y="240"><tspan fill="#bb9af7">"hardware"</tspan><tspan fill="#e6edf3">: ["ESP32","STM32","Arduino","KiCad","LTspice"],</tspan></text>
<text x="18" y="264"><tspan fill="#bb9af7">"software"</tspan><tspan fill="#e6edf3">: ["React","Next.js","Node.js","Python","C","C++","Javascript"],</tspan></text>
<text x="18" y="288"><tspan fill="#bb9af7">"projects"</tspan><tspan fill="#e6edf3">: ["Warp-Speed","GisunOS","AI Website Navigation Assistant"],</tspan></text>
<text x="18" y="312"><tspan fill="#bb9af7">"focus"</tspan><tspan fill="#e6edf3">: ["Embedded","IoT","VLSI","Open Source"]</tspan></text>
<text y="336" fill="#ffbd2e">}</text>
</g>

<!-- Command 4 -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.1s" fill="freeze"/>
<text y="374"><tspan fill="#7aa2f7">❯</tspan><tspan fill="#7dcfff"> git status</tspan></text>
</g>
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="6.8s" dur="0.1s" fill="freeze"/>
<text y="400" fill="#a5d6ff">Repositories : Active</text>
</g>

<!-- Command 5 / Final Prompt -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.1s" fill="freeze"/>
<text y="424"><tspan fill="#7aa2f7">❯</tspan><tspan fill="#e6edf3"> explore --portfolio</tspan></text>
<!-- Blinking Cursor -->
<rect x="170" y="410" width="10" height="18" fill="#e6edf3">
<animate attributeName="opacity" values="1;0;1" dur="1s" begin="7.8s" repeatCount="indefinite"/>
</rect>
</g>

</g>
</g>

<!-- Footer -->
<text x="590" y="585" text-anchor="middle"
fill="url(#accent)"
font-size="14"
font-family="JetBrains Mono,monospace"
letter-spacing="0.5">
Embedded Systems Engineer • IoT Engineer • Full Stack Developer • Open Source Contributor
</text>

</svg>
